<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="100%" height="100%">
  <defs>
    <!-- Imports Outfit, a premium modern geometric sans-serif font -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;800&amp;display=swap');
      .brand-text {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
        letter-spacing: -0.03em;
      }
    </style>

    <!-- Emerald Teal Gradient -->
    <linearGradient id="emeraldTeal" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>

    <!-- Gold Growth Gradient -->
    <linearGradient id="goldGrowth" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#fcd34d" />
    </linearGradient>
  </defs>

  <!-- Modern Geometric Logo Mark -->
  <g transform="translate(15, 0)">
    <!-- Rupee symbol horizontal bars (Gold) -->
    <path d="M 35,46 L 70,46" stroke="url(#goldGrowth)" stroke-width="9" stroke-linecap="round" />
    <path d="M 35,60 L 64,60" stroke="url(#goldGrowth)" stroke-width="9" stroke-linecap="round" />

    <!-- Emerald Teal 'P' shape (Paisa / Partner / Platform) -->
    <!-- Vertical Stem -->
    <path d="M 48,28 L 48,122" stroke="url(#emeraldTeal)" stroke-width="12" stroke-linecap="round" />
    <!-- Loop of P -->
    <path d="M 48,28 C 82,28 104,45 104,68 C 104,91 82,108 48,108" fill="none" stroke="url(#emeraldTeal)" stroke-width="12" stroke-linecap="round" />

    <!-- Gold Upward-Right Growth Arrow (Earning / Commission Growth) -->
    <!-- Shaft -->
    <path d="M 64,96 L 112,48" stroke="url(#goldGrowth)" stroke-width="10" stroke-linecap="round" />
    <!-- Arrowhead -->
    <path d="M 94,48 L 112,48 L 112,66" fill="none" stroke="url(#goldGrowth)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Premium Typography -->
  <!-- "paisa" in regular weight slate, "milega" in extra-bold teal-green -->
  <text x="165" y="95" font-size="68" class="brand-text">
    <tspan fill="#0f172a" font-weight="500">paisa</tspan><tspan fill="#0f766e" font-weight="800">milega</tspan>
  </text>
</svg>
